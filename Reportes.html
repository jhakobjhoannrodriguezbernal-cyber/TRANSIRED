<!DOCTYPE html>
<html lang="es">
<head>
    <title>Avisos y Reportes - TRANSIRED</title>
    <link rel="stylesheet" href="reporte.css">
</head>
<body>
    <div class="main">
        <div class="navbar">
            <div class="iconh">
              <h2 class="logo"><img src="3.png"></h2>
            </div>
            <div class="menu">
                <ul>
                    <li><a href="index.html">INICIO</a></li>
                    <li><a href="https://moralesmuni.gob.pe/">ACERCA DE NOSOTROS</a></li>
                    <li><a href="mapa.html">MAPA DEL DISTRITO</a></li>
                    <li><a href="Noticias.html">NOTICIAS</a></li>
                </ul>
            </div>
        </div>

        <div class="reporte-container">
            <h1>AVISAR UN REPORTE</h1>
            <p class="subtitulo">Reporta incidentes de tránsito en el distrito de Morales</p>

            <!-- Formulario propio conectado a MongoDB -->
            <div class="form-reporte">
                <div class="campo">
                    <label for="tipo">Tipo de incidente *</label>
                    <select id="tipo">
                        <option value="">-- Selecciona --</option>
                        <option value="accidente">Accidente de tránsito</option>
                        <option value="semaforo">Semáforo dañado</option>
                        <option value="bache">Bache / Hueco en la pista</option>
                        <option value="señal">Señal de tránsito dañada</option>
                        <option value="iluminacion">Falta de iluminación</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="descripcion">Descripción *</label>
                    <textarea id="descripcion" rows="4" placeholder="Describe el problema con el mayor detalle posible..."></textarea>
                </div>

                <div class="campo">
                    <label for="direccion">Dirección / Referencia</label>
                    <input type="text" id="direccion" placeholder="Ej: Av. Principal cruce con Jr. Lima">
                </div>

                <p id="msg-ok"  style="display:none; color:green; font-weight:bold; margin-top:10px;">✅ Reporte enviado correctamente. ¡Gracias!</p>
                <p id="msg-err" style="display:none; color:#c00;  font-weight:bold; margin-top:10px;">❌ Error al enviar. Inténtalo de nuevo.</p>

                <button class="btn-enviar" id="btnEnviar">ENVIAR REPORTE</button>
            </div>

            <!-- Lista de reportes recientes -->
            <div class="reportes-recientes">
                <h2>Reportes Recientes</h2>
                <div id="lista-reportes">
                    <p class="cargando">Cargando reportes...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
      // Obtener usuario de sessionStorage
      function getUsuario() {
        try {
          const u = sessionStorage.getItem('user');
          return u ? JSON.parse(u).email : 'anónimo';
        } catch { return 'anónimo'; }
      }

      // Enviar reporte a MongoDB via API
      document.getElementById('btnEnviar').addEventListener('click', async () => {
        const tipo        = document.getElementById('tipo').value;
        const descripcion = document.getElementById('descripcion').value.trim();
        const direccion   = document.getElementById('direccion').value.trim();
        const msgOk       = document.getElementById('msg-ok');
        const msgErr      = document.getElementById('msg-err');

        msgOk.style.display  = 'none';
        msgErr.style.display = 'none';

        if (!tipo || !descripcion) {
          alert('Por favor completa el tipo y la descripción.');
          return;
        }

        try {
          const res = await fetch('/api/reportes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              tipo,
              descripcion,
              direccion,
              usuario: getUsuario()
            })
          });

          if (!res.ok) throw new Error('Error del servidor');

          msgOk.style.display = 'block';
          // Limpiar formulario
          document.getElementById('tipo').value           = '';
          document.getElementById('descripcion').value    = '';
          document.getElementById('direccion').value      = '';

          // Recargar lista
          cargarReportes();

        } catch (err) {
          msgErr.style.display = 'block';
          console.error(err);
        }
      });

      // Cargar reportes recientes desde MongoDB
      async function cargarReportes() {
        const lista = document.getElementById('lista-reportes');
        try {
          const res  = await fetch('/api/reportes');
          const data = await res.json();

          if (!data.length) {
            lista.innerHTML = '<p>No hay reportes aún. ¡Sé el primero!</p>';
            return;
          }

          lista.innerHTML = data.map(r => `
            <div class="reporte-item estado-${r.estado}">
              <span class="reporte-tipo">${r.tipo.toUpperCase()}</span>
              <p class="reporte-desc">${r.descripcion}</p>
              ${r.direccion ? `<p class="reporte-dir">📍 ${r.direccion}</p>` : ''}
              <div class="reporte-meta">
                <span class="estado-badge">${r.estado}</span>
                <span class="reporte-fecha">${new Date(r.fecha).toLocaleDateString('es-PE')}</span>
              </div>
            </div>
          `).join('');

        } catch (err) {
          lista.innerHTML = '<p>No se pudieron cargar los reportes.</p>';
        }
      }

      // Cargar al iniciar
      cargarReportes();
    </script>
</body>
</html>
