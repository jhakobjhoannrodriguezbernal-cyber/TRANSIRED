    <SCript src="https://unpkg.com/ionicons@5.4.0/dist/ionicons.js"></SCript>
        <script>
      // Renderiza el área de usuario en la barra según sessionStorage
      (function() {
        const userArea = document.getElementById('user-area');
        if (!userArea) return;

        const userJson = sessionStorage.getItem('user');
        if (userJson) {
          try {
            const user = JSON.parse(userJson);
            // Render minimal: foto, nombre y correo + botón de cerrar sesión
            userArea.innerHTML = `
              <div class="nav-user" style="display:flex;align-items:center;gap:8px;">
                <img src="${user.picture || ''}" alt="avatar" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">
                <div style="display:flex;flex-direction:column;min-width:120px;">
                  <span style="font-weight:bold;font-size:0.95rem;">${user.name || ''}</span>
                  <span style="font-size:0.75rem;color:#555;">${user.email || ''}</span>
                </div>
                <button id="logoutBtn" style="margin-left:8px;padding:6px 10px;border-radius:6px;cursor:pointer;">Cerrar sesión</button>
              </div>
            `;
            document.getElementById('logoutBtn').addEventListener('click', signOut);
          } catch (e) {
            // en caso de error, dejar el enlace de login por defecto
            console.error('Error parseando user en sessionStorage', e);
          }
        } else {
          // si no hay user, asegurarse de que el enlace lleve a login.html
          userArea.innerHTML = `<a href="login.html"><button class="cta-button"><b>INICIAR SESIÓN</b></button></a>`;
        }
      })();

      function signOut() {
        // limpiar credenciales locales y recargar/ir a login
        sessionStorage.removeItem('user');
        sessionStorage.removeItem('g_credential');
        // redirigir a login o recargar para mostrar estado sin sesión
        window.location.href = 'login.html';
      }
    </script>
